<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Calendar -->
  <g transform="translate(100, 60)">
    <rect x="0" y="0" width="160" height="150" rx="10" fill="#fff" stroke="#1e40af" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="40" rx="10" fill="#1e40af"/>
    <rect x="0" y="30" width="160" height="10" fill="#1e40af"/>
    <text x="80" y="28" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold" font-family="sans-serif">3月16日</text>
    <!-- Calendar grid -->
    <rect x="15" y="55" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="40" y="55" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="65" y="55" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="90" y="55" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="115" y="55" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="15" y="80" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="40" y="80" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="65" y="80" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="90" y="80" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="115" y="80" width="18" height="14" rx="3" fill="#ef4444" opacity="0.3"/>
    <rect x="15" y="105" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="40" y="105" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="65" y="105" width="18" height="14" rx="3" fill="#e2e8f0"/>
    <rect x="90" y="105" width="18" height="14" rx="3" fill="#ef4444"/>
    <!-- Deadline circle -->
    <circle cx="99" cy="112" r="12" fill="none" stroke="#ef4444" stroke-width="2"/>
  </g>
  <!-- Checklist -->
  <g transform="translate(320, 50)">
    <rect x="0" y="0" width="200" height="280" rx="10" fill="#fff" stroke="#1e40af" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="45" rx="10" fill="#4f46e5"/>
    <rect x="0" y="35" width="200" height="10" fill="#4f46e5"/>
    <text x="100" y="30" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="sans-serif">確定申告チェックリスト</text>
    <!-- Check items -->
    <rect x="20" y="65" width="16" height="16" rx="3" fill="#10b981"/>
    <polyline points="24,73 28,77 34,69" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="45" y="67" width="130" height="8" rx="4" fill="#cbd5e1"/>
    <rect x="20" y="100" width="16" height="16" rx="3" fill="#10b981"/>
    <polyline points="24,108 28,112 34,104" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="45" y="102" width="110" height="8" rx="4" fill="#cbd5e1"/>
    <rect x="20" y="135" width="16" height="16" rx="3" fill="#10b981"/>
    <polyline points="24,143 28,147 34,139" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="45" y="137" width="140" height="8" rx="4" fill="#cbd5e1"/>
    <rect x="20" y="170" width="16" height="16" rx="3" fill="none" stroke="#d1d5db" stroke-width="2"/>
    <rect x="45" y="172" width="120" height="8" rx="4" fill="#cbd5e1"/>
    <rect x="20" y="205" width="16" height="16" rx="3" fill="none" stroke="#d1d5db" stroke-width="2"/>
    <rect x="45" y="207" width="100" height="8" rx="4" fill="#cbd5e1"/>
    <rect x="20" y="240" width="16" height="16" rx="3" fill="none" stroke="#d1d5db" stroke-width="2"/>
    <rect x="45" y="242" width="130" height="8" rx="4" fill="#cbd5e1"/>
  </g>
  <!-- e-Tax monitor -->
  <g transform="translate(580, 80)">
    <rect x="0" y="0" width="150" height="110" rx="8" fill="#334155"/>
    <rect x="8" y="8" width="134" height="80" rx="4" fill="#1e40af"/>
    <text x="75" y="40" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">e-Tax</text>
    <text x="75" y="60" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="sans-serif">電子申告</text>
    <rect x="55" y="95" width="40" height="5" rx="2" fill="#64748b"/>
    <!-- Stand -->
    <rect x="60" y="110" width="30" height="15" rx="2" fill="#475569"/>
    <rect x="45" y="125" width="60" height="5" rx="2" fill="#64748b"/>
  </g>
  <!-- Coins stack -->
  <g transform="translate(600, 220)">
    <ellipse cx="50" cy="90" rx="40" ry="12" fill="#d97706"/>
    <rect x="10" y="72" width="80" height="18" fill="#f59e0b"/>
    <ellipse cx="50" cy="72" rx="40" ry="12" fill="#fbbf24"/>
    <ellipse cx="50" cy="55" rx="40" ry="12" fill="#d97706"/>
    <rect x="10" y="37" width="80" height="18" fill="#f59e0b"/>
    <ellipse cx="50" cy="37" rx="40" ry="12" fill="#fbbf24"/>
    <!-- Arrow up -->
    <polygon points="50,0 65,20 55,20 55,30 45,30 45,20 35,20" fill="#10b981"/>
  </g>
</svg>