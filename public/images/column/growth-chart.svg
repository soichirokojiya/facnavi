<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Grid -->
  <line x1="100" y1="320" x2="720" y2="320" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="100" y1="60" x2="100" y2="320" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="100" y1="260" x2="720" y2="260" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="100" y1="200" x2="720" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="100" y1="140" x2="720" y2="140" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="100" y1="80" x2="720" y2="80" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <!-- Area fill under line -->
  <path d="M100,300 L200,280 L300,250 L400,220 L500,160 L600,120 L700,70 L700,320 L100,320 Z" fill="#3b82f6" opacity="0.1"/>
  <!-- Growth line -->
  <polyline points="100,300 200,280 300,250 400,220 500,160 600,120 700,70" stroke="#1e40af" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points -->
  <circle cx="100" cy="300" r="7" fill="#1e40af"/>
  <circle cx="200" cy="280" r="7" fill="#1e40af"/>
  <circle cx="300" cy="250" r="7" fill="#1e40af"/>
  <circle cx="400" cy="220" r="7" fill="#1e40af"/>
  <circle cx="500" cy="160" r="7" fill="#3b82f6"/>
  <circle cx="600" cy="120" r="7" fill="#3b82f6"/>
  <circle cx="700" cy="70" r="8" fill="#10b981"/>
  <!-- Arrow at the end pointing up -->
  <g transform="translate(710, 40)">
    <polygon points="10,0 0,20 20,20" fill="#10b981"/>
    <rect x="6" y="18" width="8" height="20" rx="2" fill="#10b981"/>
  </g>
  <!-- Decorative bar chart in background -->
  <rect x="155" y="290" width="30" height="30" rx="4" fill="#3b82f6" opacity="0.15"/>
  <rect x="255" y="270" width="30" height="50" rx="4" fill="#3b82f6" opacity="0.15"/>
  <rect x="355" y="250" width="30" height="70" rx="4" fill="#3b82f6" opacity="0.15"/>
  <rect x="455" y="210" width="30" height="110" rx="4" fill="#3b82f6" opacity="0.15"/>
  <rect x="555" y="170" width="30" height="150" rx="4" fill="#3b82f6" opacity="0.15"/>
  <rect x="655" y="130" width="30" height="190" rx="4" fill="#10b981" opacity="0.15"/>
  <!-- Star burst at peak -->
  <circle cx="700" cy="70" r="20" fill="#f59e0b" opacity="0.15"/>
  <circle cx="700" cy="70" r="30" fill="#f59e0b" opacity="0.08"/>
</svg>