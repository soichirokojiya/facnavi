<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="350" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,6"/>
  <!-- VS circle -->
  <circle cx="400" cy="200" r="28" fill="#f59e0b"/>
  <circle cx="400" cy="200" r="22" fill="#fff"/>
  <circle cx="400" cy="200" r="18" fill="#f59e0b" opacity="0.15"/>
  <!-- LEFT: Bank building -->
  <g transform="translate(80, 80)">
    <!-- Pediment (triangle) -->
    <polygon points="120,40 20,100 220,100" fill="#1e40af"/>
    <polygon points="120,55 40,100 200,100" fill="#3b82f6"/>
    <!-- Columns -->
    <rect x="40" y="100" width="25" height="120" rx="4" fill="#1e40af"/>
    <rect x="85" y="100" width="25" height="120" rx="4" fill="#1e40af"/>
    <rect x="130" y="100" width="25" height="120" rx="4" fill="#1e40af"/>
    <rect x="175" y="100" width="25" height="120" rx="4" fill="#1e40af"/>
    <!-- Base -->
    <rect x="25" y="218" width="190" height="18" rx="4" fill="#1e40af"/>
    <!-- Steps -->
    <rect x="15" y="236" width="210" height="10" rx="3" fill="#1e40af" opacity="0.6"/>
    <rect x="5" y="246" width="230" height="10" rx="3" fill="#1e40af" opacity="0.4"/>
    <!-- Column caps -->
    <rect x="36" y="96" width="33" height="8" rx="2" fill="#1e40af"/>
    <rect x="81" y="96" width="33" height="8" rx="2" fill="#1e40af"/>
    <rect x="126" y="96" width="33" height="8" rx="2" fill="#1e40af"/>
    <rect x="171" y="96" width="33" height="8" rx="2" fill="#1e40af"/>
  </g>
  <!-- RIGHT: Handshake -->
  <g transform="translate(480, 110)">
    <!-- Hand 1 (left) -->
    <path d="M40,120 L40,80 C40,70 50,60 60,65 L100,85 C110,90 110,100 100,105 L80,115" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
    <!-- Hand 2 (right) -->
    <path d="M200,120 L200,80 C200,70 190,60 180,65 L140,85 C130,90 130,100 140,105 L160,115" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <!-- Clasped area -->
    <ellipse cx="120" cy="100" rx="30" ry="18" fill="#3b82f6" opacity="0.3"/>
    <!-- Arms -->
    <rect x="10" y="110" width="60" height="30" rx="10" fill="#3b82f6"/>
    <rect x="170" y="110" width="60" height="30" rx="10" fill="#10b981"/>
  </g>
  <!-- Sparkles around handshake -->
  <g transform="translate(540, 100)">
    <polygon points="10,0 12,8 20,10 12,12 10,20 8,12 0,10 8,8" fill="#f59e0b" opacity="0.5"/>
  </g>
  <g transform="translate(680, 140)">
    <polygon points="8,0 10,6 16,8 10,10 8,16 6,10 0,8 6,6" fill="#f59e0b" opacity="0.4"/>
  </g>
  <g transform="translate(620, 260)">
    <polygon points="8,0 10,6 16,8 10,10 8,16 6,10 0,8 6,6" fill="#10b981" opacity="0.4"/>
  </g>
  <!-- Arrows showing comparison -->
  <g transform="translate(150, 340)">
    <rect x="0" y="0" width="80" height="8" rx="4" fill="#1e40af" opacity="0.2"/>
  </g>
  <g transform="translate(560, 340)">
    <rect x="0" y="0" width="80" height="8" rx="4" fill="#10b981" opacity="0.2"/>
  </g>
</svg>