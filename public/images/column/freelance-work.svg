<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Desk -->
  <rect x="150" y="270" width="500" height="16" rx="6" fill="#1e40af" opacity="0.3"/>
  <rect x="180" y="286" width="12" height="80" rx="4" fill="#1e40af" opacity="0.2"/>
  <rect x="610" y="286" width="12" height="80" rx="4" fill="#1e40af" opacity="0.2"/>
  <!-- Laptop -->
  <g transform="translate(300, 160)">
    <!-- Screen -->
    <rect x="0" y="0" width="200" height="110" rx="8" fill="#334155"/>
    <rect x="10" y="10" width="180" height="85" rx="4" fill="#1e40af"/>
    <!-- Code lines on screen -->
    <rect x="25" y="25" width="80" height="5" rx="2" fill="#10b981" opacity="0.6"/>
    <rect x="25" y="38" width="120" height="5" rx="2" fill="#93c5fd" opacity="0.6"/>
    <rect x="25" y="51" width="60" height="5" rx="2" fill="#f59e0b" opacity="0.6"/>
    <rect x="25" y="64" width="140" height="5" rx="2" fill="#93c5fd" opacity="0.6"/>
    <rect x="25" y="77" width="90" height="5" rx="2" fill="#10b981" opacity="0.6"/>
    <!-- Base -->
    <path d="M-20,110 L220,110 L200,125 L0,125 Z" fill="#94a3b8" opacity="0.4"/>
  </g>
  <!-- Person (upper body behind laptop) -->
  <!-- Head -->
  <circle cx="400" cy="110" r="35" fill="#3b82f6"/>
  <circle cx="400" cy="100" r="18" fill="#bfdbfe"/>
  <!-- Body -->
  <rect x="370" y="140" width="60" height="50" rx="14" fill="#3b82f6"/>
  <!-- Arms reaching to keyboard -->
  <rect x="320" y="195" width="70" height="14" rx="7" fill="#3b82f6"/>
  <rect x="410" y="195" width="70" height="14" rx="7" fill="#3b82f6"/>
  <!-- Coffee mug -->
  <g transform="translate(560, 230)">
    <rect x="0" y="5" width="30" height="35" rx="4" fill="#f59e0b"/>
    <path d="M30,12 C45,12 45,32 30,32" stroke="#f59e0b" stroke-width="3" fill="none"/>
    <!-- Steam -->
    <path d="M8,0 C8,-8 15,-5 15,-12" stroke="#94a3b8" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M20,0 C20,-8 27,-5 27,-12" stroke="#94a3b8" stroke-width="2" fill="none" opacity="0.3"/>
  </g>
  <!-- Floating task icons -->
  <g transform="translate(120, 60)">
    <rect x="0" y="0" width="60" height="45" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="12" y="12" width="36" height="5" rx="2" fill="#cbd5e1"/>
    <rect x="12" y="24" width="24" height="5" rx="2" fill="#cbd5e1"/>
  </g>
  <g transform="translate(640, 80)">
    <rect x="0" y="0" width="60" height="45" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="30" cy="22" r="10" fill="#10b981" opacity="0.3"/>
    <path d="M24,22 l4,4 l8,-10" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Plant decoration -->
  <g transform="translate(190, 210)">
    <rect x="15" y="40" width="20" height="25" rx="4" fill="#94a3b8" opacity="0.3"/>
    <circle cx="25" cy="32" r="16" fill="#10b981" opacity="0.3"/>
    <circle cx="15" cy="25" r="10" fill="#10b981" opacity="0.3"/>
    <circle cx="35" cy="28" r="10" fill="#10b981" opacity="0.3"/>
  </g>
</svg>