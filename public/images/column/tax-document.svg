<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Document shadow -->
  <rect x="260" y="48" width="280" height="340" rx="12" fill="#1e40af" opacity="0.1"/>
  <!-- Document -->
  <rect x="250" y="40" width="280" height="340" rx="12" fill="#fff" stroke="#1e40af" stroke-width="2"/>
  <!-- Document header -->
  <rect x="250" y="40" width="280" height="60" rx="12" fill="#1e40af"/>
  <rect x="250" y="80" width="280" height="20" fill="#1e40af"/>
  <!-- Yen symbol in header circle -->
  <circle cx="390" cy="70" r="22" fill="#fff" opacity="0.2"/>
  <circle cx="390" cy="70" r="16" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Yen sign shape -->
  <line x1="380" y1="58" x2="390" y2="70" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="400" y1="58" x2="390" y2="70" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="390" y1="70" x2="390" y2="82" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="382" y1="72" x2="398" y2="72" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="382" y1="77" x2="398" y2="77" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Content lines -->
  <rect x="285" y="120" width="180" height="8" rx="4" fill="#cbd5e1"/>
  <rect x="285" y="145" width="140" height="8" rx="4" fill="#cbd5e1"/>
  <!-- Table on document -->
  <rect x="285" y="175" width="200" height="1" fill="#e2e8f0"/>
  <rect x="285" y="175" width="100" height="25" fill="#f1f5f9"/>
  <rect x="385" y="175" width="100" height="25" fill="#f8fafc"/>
  <rect x="285" y="200" width="200" height="1" fill="#e2e8f0"/>
  <rect x="285" y="200" width="100" height="25" fill="#f8fafc"/>
  <rect x="385" y="200" width="100" height="25" fill="#f1f5f9"/>
  <rect x="285" y="225" width="200" height="1" fill="#e2e8f0"/>
  <rect x="285" y="225" width="100" height="25" fill="#f1f5f9"/>
  <rect x="385" y="225" width="100" height="25" fill="#f8fafc"/>
  <rect x="285" y="250" width="200" height="1" fill="#e2e8f0"/>
  <!-- Total row -->
  <rect x="285" y="270" width="200" height="30" rx="4" fill="#1e40af" opacity="0.1"/>
  <rect x="395" y="278" width="80" height="10" rx="4" fill="#1e40af" opacity="0.3"/>
  <!-- Stamp -->
  <circle cx="450" cy="340" r="22" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  <circle cx="450" cy="340" r="16" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <!-- Calculator decoration -->
  <g transform="translate(580, 150)">
    <rect x="0" y="0" width="80" height="110" rx="8" fill="#334155"/>
    <rect x="8" y="8" width="64" height="25" rx="4" fill="#10b981" opacity="0.5"/>
    <rect x="12" y="42" width="14" height="14" rx="3" fill="#94a3b8"/>
    <rect x="33" y="42" width="14" height="14" rx="3" fill="#94a3b8"/>
    <rect x="54" y="42" width="14" height="14" rx="3" fill="#f59e0b"/>
    <rect x="12" y="62" width="14" height="14" rx="3" fill="#94a3b8"/>
    <rect x="33" y="62" width="14" height="14" rx="3" fill="#94a3b8"/>
    <rect x="54" y="62" width="14" height="14" rx="3" fill="#f59e0b"/>
    <rect x="12" y="82" width="14" height="14" rx="3" fill="#94a3b8"/>
    <rect x="33" y="82" width="14" height="14" rx="3" fill="#94a3b8"/>
    <rect x="54" y="82" width="14" height="14" rx="3" fill="#3b82f6"/>
  </g>
  <!-- Coins -->
  <ellipse cx="140" cy="280" rx="35" ry="12" fill="#d97706"/>
  <rect x="105" y="260" width="70" height="20" fill="#f59e0b"/>
  <ellipse cx="140" cy="260" rx="35" ry="12" fill="#fbbf24"/>
  <ellipse cx="140" cy="240" rx="35" ry="12" fill="#d97706"/>
  <rect x="105" y="220" width="70" height="20" fill="#f59e0b"/>
  <ellipse cx="140" cy="220" rx="35" ry="12" fill="#fbbf24"/>
</svg>