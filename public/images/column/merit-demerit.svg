<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Left half - merits -->
  <rect x="0" y="0" width="400" height="400" fill="#ecfdf5" rx="12"/>
  <!-- Right half - demerits -->
  <rect x="400" y="0" width="400" height="400" fill="#fffbeb" rx="12"/>
  <!-- Left: Plus signs and thumbs up -->
  <circle cx="120" cy="100" r="30" fill="#10b981"/>
  <rect x="108" y="88" width="24" height="24" rx="4" fill="#ecfdf5"/>
  <rect x="114" y="82" width="12" height="36" rx="4" fill="#10b981"/>
  <rect x="102" y="94" width="36" height="12" rx="4" fill="#10b981"/>
  <rect x="114" y="82" width="12" height="36" rx="4" fill="#fff"/>
  <rect x="102" y="94" width="36" height="12" rx="4" fill="#fff"/>
  <circle cx="280" cy="160" r="25" fill="#10b981" opacity="0.6"/>
  <rect x="272" y="146" width="8" height="28" rx="3" fill="#fff"/>
  <rect x="262" y="154" width="28" height="8" rx="3" fill="#fff" opacity="0.9"/>
  <circle cx="180" cy="260" r="35" fill="#10b981" opacity="0.8"/>
  <rect x="170" y="242" width="10" height="34" rx="4" fill="#fff"/>
  <rect x="158" y="252" width="34" height="10" rx="4" fill="#fff"/>
  <!-- Thumbs up -->
  <g transform="translate(100, 300)">
    <path d="M30,40 C30,25 40,15 50,10 L55,5 C58,2 62,5 60,10 L55,20 L80,20 C85,20 88,25 86,30 L78,55 C76,60 72,63 66,63 L40,63 C35,63 30,58 30,53 Z" fill="#10b981"/>
  </g>
  <!-- Decorative check circles -->
  <circle cx="300" cy="80" r="18" fill="#10b981" opacity="0.4"/>
  <path d="M292,80 l5,5 l10,-12" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="80" cy="200" r="18" fill="#10b981" opacity="0.4"/>
  <path d="M72,200 l5,5 l10,-12" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Right: Warning/caution signs -->
  <g transform="translate(540, 60)">
    <polygon points="40,0 80,70 0,70" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <rect x="36" y="22" width="8" height="25" rx="3" fill="#fff"/>
    <circle cx="40" cy="56" r="5" fill="#fff"/>
  </g>
  <g transform="translate(620, 200)">
    <polygon points="35,0 70,60 0,60" fill="#f59e0b" opacity="0.7" stroke="#d97706" stroke-width="1.5"/>
    <rect x="31" y="18" width="7" height="22" rx="3" fill="#fff"/>
    <circle cx="35" cy="47" r="4" fill="#fff"/>
  </g>
  <g transform="translate(460, 250)">
    <polygon points="30,0 60,50 0,50" fill="#f59e0b" opacity="0.5" stroke="#d97706" stroke-width="1.5"/>
    <rect x="27" y="15" width="6" height="18" rx="3" fill="#fff"/>
    <circle cx="30" cy="39" r="4" fill="#fff"/>
  </g>
  <!-- Minus signs -->
  <circle cx="520" cy="160" r="22" fill="#ef4444" opacity="0.6"/>
  <rect x="508" y="156" width="24" height="8" rx="3" fill="#fff"/>
  <circle cx="700" cy="330" r="22" fill="#ef4444" opacity="0.5"/>
  <rect x="688" y="326" width="24" height="8" rx="3" fill="#fff"/>
</svg>