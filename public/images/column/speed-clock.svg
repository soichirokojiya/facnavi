<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Speed lines -->
  <rect x="80" y="130" width="120" height="6" rx="3" fill="#3b82f6" opacity="0.3"/>
  <rect x="60" y="160" width="150" height="6" rx="3" fill="#3b82f6" opacity="0.4"/>
  <rect x="100" y="190" width="130" height="6" rx="3" fill="#3b82f6" opacity="0.5"/>
  <rect x="70" y="220" width="140" height="6" rx="3" fill="#3b82f6" opacity="0.4"/>
  <rect x="90" y="250" width="110" height="6" rx="3" fill="#3b82f6" opacity="0.3"/>
  <!-- Clock body -->
  <circle cx="420" cy="200" r="140" fill="#1e40af"/>
  <circle cx="420" cy="200" r="125" fill="#fff"/>
  <circle cx="420" cy="200" r="118" fill="#f8fafc"/>
  <!-- Hour markers -->
  <rect x="414" y="88" width="12" height="24" rx="4" fill="#1e40af"/>
  <rect x="414" y="288" width="12" height="24" rx="4" fill="#1e40af"/>
  <rect x="298" y="194" width="24" height="12" rx="4" fill="#1e40af"/>
  <rect x="518" y="194" width="24" height="12" rx="4" fill="#1e40af"/>
  <!-- Small markers -->
  <circle cx="480" cy="110" r="5" fill="#93c5fd"/>
  <circle cx="520" cy="145" r="5" fill="#93c5fd"/>
  <circle cx="540" cy="200" r="5" fill="#93c5fd" opacity="0"/>
  <circle cx="520" cy="255" r="5" fill="#93c5fd"/>
  <circle cx="480" cy="290" r="5" fill="#93c5fd"/>
  <circle cx="360" cy="290" r="5" fill="#93c5fd"/>
  <circle cx="320" cy="255" r="5" fill="#93c5fd"/>
  <circle cx="320" cy="145" r="5" fill="#93c5fd"/>
  <circle cx="360" cy="110" r="5" fill="#93c5fd"/>
  <!-- Clock hands -->
  <line x1="420" y1="200" x2="420" y2="120" stroke="#1e40af" stroke-width="8" stroke-linecap="round"/>
  <line x1="420" y1="200" x2="490" y2="160" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="420" cy="200" r="10" fill="#f59e0b"/>
  <!-- Stopwatch top button -->
  <rect x="412" y="50" width="16" height="20" rx="6" fill="#1e40af"/>
  <!-- Lightning bolt for speed -->
  <g transform="translate(620, 120)">
    <polygon points="40,0 15,50 35,50 20,100 70,40 45,40 60,0" fill="#f59e0b"/>
  </g>
  <!-- More speed lines right -->
  <rect x="650" y="240" width="80" height="5" rx="3" fill="#f59e0b" opacity="0.3"/>
  <rect x="630" y="260" width="100" height="5" rx="3" fill="#f59e0b" opacity="0.4"/>
  <rect x="660" y="280" width="70" height="5" rx="3" fill="#f59e0b" opacity="0.3"/>
</svg>