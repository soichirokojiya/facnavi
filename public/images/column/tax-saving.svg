<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Three pillars of tax saving -->
  <!-- Pillar 1 -->
  <g transform="translate(100, 50)">
    <rect x="0" y="80" width="150" height="240" rx="8" fill="#1e40af" opacity="0.9"/>
    <rect x="0" y="80" width="150" height="45" rx="8" fill="#1e40af"/>
    <rect x="0" y="115" width="150" height="10" fill="#1e40af"/>
    <text x="75" y="108" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">小規模企業共済</text>
    <!-- Amount -->
    <rect x="15" y="140" width="120" height="35" rx="6" fill="#fff" opacity="0.15"/>
    <text x="75" y="158" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif">年間最大</text>
    <text x="75" y="175" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="bold" font-family="sans-serif">84万円</text>
    <text x="75" y="193" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="sans-serif">所得控除</text>
    <!-- Icon -->
    <circle cx="75" cy="40" r="35" fill="#1e40af"/>
    <circle cx="75" cy="40" r="32" fill="#fff"/>
    <text x="75" y="47" text-anchor="middle" font-size="28">🏦</text>
  </g>
  <!-- Pillar 2 -->
  <g transform="translate(320, 50)">
    <rect x="0" y="80" width="150" height="240" rx="8" fill="#4f46e5" opacity="0.9"/>
    <rect x="0" y="80" width="150" height="45" rx="8" fill="#4f46e5"/>
    <rect x="0" y="115" width="150" height="10" fill="#4f46e5"/>
    <text x="75" y="108" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">iDeCo</text>
    <rect x="15" y="140" width="120" height="35" rx="6" fill="#fff" opacity="0.15"/>
    <text x="75" y="158" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif">年間最大</text>
    <text x="75" y="175" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="bold" font-family="sans-serif">81.6万円</text>
    <text x="75" y="193" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="sans-serif">所得控除</text>
    <circle cx="75" cy="40" r="35" fill="#4f46e5"/>
    <circle cx="75" cy="40" r="32" fill="#fff"/>
    <text x="75" y="47" text-anchor="middle" font-size="28">📊</text>
  </g>
  <!-- Pillar 3 -->
  <g transform="translate(540, 50)">
    <rect x="0" y="80" width="150" height="240" rx="8" fill="#7c3aed" opacity="0.9"/>
    <rect x="0" y="80" width="150" height="45" rx="8" fill="#7c3aed"/>
    <rect x="0" y="115" width="150" height="10" fill="#7c3aed"/>
    <text x="75" y="108" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">経営セーフティ共済</text>
    <rect x="15" y="140" width="120" height="35" rx="6" fill="#fff" opacity="0.15"/>
    <text x="75" y="158" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif">年間最大</text>
    <text x="75" y="175" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="bold" font-family="sans-serif">240万円</text>
    <text x="75" y="193" text-anchor="middle" fill="#d8b4fe" font-size="10" font-family="sans-serif">必要経費</text>
    <circle cx="75" cy="40" r="35" fill="#7c3aed"/>
    <circle cx="75" cy="40" r="32" fill="#fff"/>
    <text x="75" y="47" text-anchor="middle" font-size="28">🛡️</text>
  </g>
  <!-- Bottom bar -->
  <rect x="100" y="345" width="590" height="35" rx="8" fill="#10b981"/>
  <text x="395" y="368" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="sans-serif">合計 年間最大 405.6万円の控除・経費算入が可能</text>
</svg>