<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f5f0ff" rx="12"/>
  <!-- Card 1 - Free -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="200" height="130" rx="12" fill="#1e40af"/>
    <rect x="15" y="20" width="28" height="20" rx="3" fill="#fbbf24" opacity="0.7"/>
    <text x="100" y="75" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="sans-serif">年会費無料カード</text>
    <text x="100" y="100" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="sans-serif">還元率 0.5〜1.5%</text>
    <!-- Tag -->
    <rect x="130" y="10" width="60" height="20" rx="10" fill="#10b981"/>
    <text x="160" y="24" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold" font-family="sans-serif">おすすめ</text>
  </g>
  <!-- Card 2 - Mid -->
  <g transform="translate(300, 60)">
    <rect x="0" y="0" width="200" height="130" rx="12" fill="#6366f1"/>
    <rect x="15" y="20" width="28" height="20" rx="3" fill="#fbbf24" opacity="0.7"/>
    <text x="100" y="75" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="sans-serif">コスパ重視カード</text>
    <text x="100" y="100" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="sans-serif">還元率 0.5〜1.0%</text>
  </g>
  <!-- Card 3 - Premium -->
  <g transform="translate(550, 60)">
    <rect x="0" y="0" width="200" height="130" rx="12" fill="#334155"/>
    <rect x="15" y="20" width="28" height="20" rx="3" fill="#fbbf24"/>
    <text x="100" y="75" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="sans-serif">ステータスカード</text>
    <text x="100" y="100" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif">還元率 0.4〜1.0%</text>
  </g>
  <!-- Comparison table below -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="700" height="150" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Header -->
    <rect x="0" y="0" width="700" height="35" rx="10" fill="#f1f5f9"/>
    <rect x="0" y="25" width="700" height="10" fill="#f1f5f9"/>
    <text x="90" y="23" text-anchor="middle" fill="#64748b" font-size="11" font-weight="bold" font-family="sans-serif">比較項目</text>
    <text x="280" y="23" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold" font-family="sans-serif">年会費無料</text>
    <text x="460" y="23" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="bold" font-family="sans-serif">コスパ重視</text>
    <text x="630" y="23" text-anchor="middle" fill="#334155" font-size="11" font-weight="bold" font-family="sans-serif">ステータス</text>
    <!-- Row 1 -->
    <text x="90" y="60" text-anchor="middle" fill="#475569" font-size="10" font-family="sans-serif">年会費</text>
    <text x="280" y="60" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold" font-family="sans-serif">0円</text>
    <text x="460" y="60" text-anchor="middle" fill="#475569" font-size="10" font-family="sans-serif">〜2,200円</text>
    <text x="630" y="60" text-anchor="middle" fill="#475569" font-size="10" font-family="sans-serif">11,000〜36,300円</text>
    <line x1="15" y1="70" x2="685" y2="70" stroke="#f1f5f9" stroke-width="1"/>
    <!-- Row 2 -->
    <text x="90" y="90" text-anchor="middle" fill="#475569" font-size="10" font-family="sans-serif">空港ラウンジ</text>
    <text x="280" y="90" text-anchor="middle" fill="#ef4444" font-size="10" font-family="sans-serif">✕</text>
    <text x="460" y="90" text-anchor="middle" fill="#ef4444" font-size="10" font-family="sans-serif">✕</text>
    <text x="630" y="90" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold" font-family="sans-serif">○</text>
    <line x1="15" y1="100" x2="685" y2="100" stroke="#f1f5f9" stroke-width="1"/>
    <!-- Row 3 -->
    <text x="90" y="120" text-anchor="middle" fill="#475569" font-size="10" font-family="sans-serif">おすすめ層</text>
    <text x="280" y="120" text-anchor="middle" fill="#475569" font-size="10" font-family="sans-serif">開業直後</text>
    <text x="460" y="120" text-anchor="middle" fill="#475569" font-size="10" font-family="sans-serif">経費月10万〜</text>
    <text x="630" y="120" text-anchor="middle" fill="#475569" font-size="10" font-family="sans-serif">出張が多い方</text>
    <line x1="15" y1="130" x2="685" y2="130" stroke="#f1f5f9" stroke-width="1"/>
    <!-- Row 4 -->
    <text x="90" y="145" text-anchor="middle" fill="#475569" font-size="10" font-family="sans-serif">会計ソフト連携</text>
    <text x="280" y="145" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold" font-family="sans-serif">○</text>
    <text x="460" y="145" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold" font-family="sans-serif">○</text>
    <text x="630" y="145" text-anchor="middle" fill="#10b981" font-size="10" font-weight="bold" font-family="sans-serif">○</text>
  </g>
</svg>