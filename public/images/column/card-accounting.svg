    <rect x="75" y="61" width="40" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="130" y="59" width="30" height="10" rx="3" fill="#10b981" opacity="0.2"/>
    <text x="145" y="67" text-anchor="middle" fill="#10b981" font-size="7" font-family="sans-serif">✓</text>
    <rect x="12" y="90" width="156" height="28" rx="4" fill="#f8fafc"/>
    <rect x="18" y="96" width="45" height="6" rx="3" fill="#94a3b8"/>
    <rect x="75" y="96" width="35" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="130" y="94" width="30" height="10" rx="3" fill="#10b981" opacity="0.2"/>
    <text x="145" y="102" text-anchor="middle" fill="#10b981" font-size="7" font-family="sans-serif">✓</text>
    <rect x="12" y="125" width="156" height="28" rx="4" fill="#f1f5f9"/>
    <rect x="18" y="131" width="55" height="6" rx="3" fill="#94a3b8"/>
    <rect x="75" y="131" width="42" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="130" y="129" width="30" height="10" rx="3" fill="#10b981" opacity="0.2"/>
    <text x="145" y="137" text-anchor="middle" fill="#10b981" font-size="7" font-family="sans-serif">✓</text>
    <rect x="12" y="160" width="156" height="28" rx="4" fill="#f8fafc"/>
    <rect x="18" y="166" width="48" height="6" rx="3" fill="#94a3b8"/>
    <rect x="75" y="166" width="38" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="130" y="164" width="30" height="10" rx="3" fill="#f59e0b" opacity="0.2"/>
    <text x="145" y="172" text-anchor="middle" fill="#f59e0b" font-size="7" font-family="sans-serif">?</text>
    <!-- Summary -->
    <rect x="12" y="200" width="156" height="28" rx="4" fill="#1e40af" opacity="0.1"/>
    <text x="90" y="218" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="bold" font-family="sans-serif">自動仕訳 完了</text>
  </g>
  <!-- Arrow 2 -->
  <g transform="translate(525, 175)">
    <line x1="0" y1="15" x2="60" y2="15" stroke="#3b82f6" stroke-width="3" stroke-dasharray="6,4"/>
