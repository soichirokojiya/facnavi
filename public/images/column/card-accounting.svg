    <rect x="75" y="110" width="40" height="5" rx="2" fill="#94a3b8"/>
    <rect x="15" y="125" width="50" height="5" rx="2" fill="#94a3b8"/>
    <rect x="75" y="125" width="40" height="5" rx="2" fill="#94a3b8"/>
    <!-- Stamp -->
    <circle cx="95" cy="155" r="15" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
