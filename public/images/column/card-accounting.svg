<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Card on left -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="160" height="100" rx="10" fill="#6366f1"/>
    <rect x="12" y="25" width="30" height="22" rx="4" fill="#fbbf24" opacity="0.7"/>
    <rect x="12" y="65" width="90" height="6" rx="3" fill="#fff" opacity="0.4"/>
    <rect x="12" y="78" width="60" height="5" rx="2" fill="#fff" opacity="0.3"/>
    <circle cx="135" cy="80" r="10" fill="#fff" opacity="0.25"/>
    <circle cx="148" cy="80" r="10" fill="#fff" opacity="0.15"/>
  </g>
  <!-- Arrow 1 -->
  <g transform="translate(240, 175)">
    <line x1="0" y1="15" x2="60" y2="15" stroke="#3b82f6" stroke-width="3" stroke-dasharray="6,4"/>
    <polygon points="60,8 75,15 60,22" fill="#3b82f6"/>
    <text x="37" y="5" text-anchor="middle" fill="#6b7280" font-size="9" font-family="sans-serif">自動連携</text>
  </g>
  <!-- Cloud accounting software -->
