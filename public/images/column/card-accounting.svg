    <rect x="0" y="30" width="180" height="10" fill="#1e40af"/>
    <text x="90" y="28" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="sans-serif">会計ソフト</text>
    <!-- Transaction rows -->
    <rect x="12" y="55" width="156" height="28" rx="4" fill="#f1f5f9"/>
