    <text x="37" y="5" text-anchor="middle" fill="#6b7280" font-size="9" font-family="sans-serif">自動作成</text>
  </g>
  <!-- Tax return document -->
  <g transform="translate(615, 100)">
    <rect x="0" y="0" width="130" height="180" rx="8" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="130" height="35" rx="8" fill="#10b981"/>
    <rect x="0" y="25" width="130" height="10" fill="#10b981"/>
    <text x="65" y="23" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold" font-family="sans-serif">確定申告書</text>
