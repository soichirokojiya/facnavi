<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Divider -->
  <line x1="400" y1="40" x2="400" y2="360" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,6"/>
  <!-- LEFT: 2-party -->
  <circle cx="140" cy="170" r="45" fill="#1e40af"/>
  <circle cx="140" cy="145" r="16" fill="#93c5fd"/>
  <rect x="120" y="165" width="40" height="30" rx="8" fill="#93c5fd"/>
  <circle cx="300" cy="170" r="45" fill="#3b82f6"/>
  <circle cx="300" cy="145" r="16" fill="#bfdbfe"/>
  <rect x="280" y="165" width="40" height="30" rx="8" fill="#bfdbfe"/>
  <!-- Connection line -->
  <line x1="185" y1="170" x2="255" y2="170" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  <polygon points="250,160 270,170 250,180" fill="#f59e0b"/>
  <polygon points="190,160 175,170 190,180" fill="#f59e0b"/>
  <!-- Left label bar -->
  <rect x="150" y="280" width="100" height="36" rx="18" fill="#1e40af"/>
  <circle cx="185" cy="298" r="6" fill="#fff"/>
  <circle cx="215" cy="298" r="6" fill="#fff"/>
  <!-- RIGHT: 3-party -->
  <circle cx="600" cy="120" r="40" fill="#1e40af"/>
  <circle cx="600" cy="98" r="14" fill="#93c5fd"/>
  <rect x="582" y="116" width="36" height="26" rx="7" fill="#93c5fd"/>
  <circle cx="500" cy="260" r="40" fill="#3b82f6"/>
  <circle cx="500" cy="238" r="14" fill="#bfdbfe"/>
  <rect x="482" y="256" width="36" height="26" rx="7" fill="#bfdbfe"/>
  <circle cx="700" cy="260" r="40" fill="#10b981"/>
  <circle cx="700" cy="238" r="14" fill="#6ee7b7"/>
  <rect x="682" y="256" width="36" height="26" rx="7" fill="#6ee7b7"/>
  <!-- Triangle connections -->
  <line x1="575" y1="150" x2="520" y2="230" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="625" y1="150" x2="680" y2="230" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="540" y1="260" x2="660" y2="260" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow tips -->
  <circle cx="520" cy="230" r="5" fill="#f59e0b"/>
  <circle cx="680" cy="230" r="5" fill="#f59e0b"/>
  <circle cx="575" cy="150" r="5" fill="#f59e0b"/>
  <circle cx="625" cy="150" r="5" fill="#f59e0b"/>
  <!-- Right label bar -->
  <rect x="550" y="330" width="120" height="36" rx="18" fill="#10b981"/>
  <circle cx="590" cy="348" r="6" fill="#fff"/>
  <circle cx="610" cy="348" r="6" fill="#fff"/>
  <circle cx="630" cy="348" r="6" fill="#fff"/>
</svg>