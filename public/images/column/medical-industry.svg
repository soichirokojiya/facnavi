<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Hospital building -->
  <rect x="250" y="120" width="300" height="230" rx="10" fill="#fff" stroke="#1e40af" stroke-width="2"/>
  <rect x="250" y="120" width="300" height="50" rx="10" fill="#1e40af"/>
  <rect x="370" y="300" width="60" height="50" rx="4" fill="#3b82f6"/>
  <!-- Windows -->
  <rect x="280" y="190" width="35" height="35" rx="6" fill="#bfdbfe"/>
  <rect x="335" y="190" width="35" height="35" rx="6" fill="#bfdbfe"/>
  <rect x="430" y="190" width="35" height="35" rx="6" fill="#bfdbfe"/>
  <rect x="485" y="190" width="35" height="35" rx="6" fill="#bfdbfe"/>
  <rect x="280" y="250" width="35" height="35" rx="6" fill="#bfdbfe"/>
  <rect x="335" y="250" width="35" height="35" rx="6" fill="#bfdbfe"/>
  <rect x="430" y="250" width="35" height="35" rx="6" fill="#bfdbfe"/>
  <rect x="485" y="250" width="35" height="35" rx="6" fill="#bfdbfe"/>
  <!-- Medical cross on building -->
  <rect x="382" y="128" width="36" height="36" rx="4" fill="none"/>
  <rect x="394" y="124" width="12" height="42" rx="3" fill="#fff"/>
  <rect x="382" y="137" width="36" height="12" rx="3" fill="#fff"/>
  <!-- Large medical cross -->
  <g transform="translate(80, 80)">
    <circle cx="60" cy="60" r="55" fill="#ef4444" opacity="0.15"/>
    <circle cx="60" cy="60" r="40" fill="#ef4444" opacity="0.2"/>
    <rect x="48" y="30" width="24" height="60" rx="6" fill="#ef4444"/>
    <rect x="30" y="48" width="60" height="24" rx="6" fill="#ef4444"/>
  </g>
  <!-- Heartbeat line -->
  <polyline points="80,320 200,320 230,320 250,280 270,350 290,300 310,320 700,320" stroke="#ef4444" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Stethoscope abstract -->
  <g transform="translate(620, 100)">
    <circle cx="50" cy="80" r="30" fill="none" stroke="#1e40af" stroke-width="4" opacity="0.4"/>
    <path d="M50,50 C50,20 30,20 30,40 L30,60" stroke="#1e40af" stroke-width="4" fill="none" opacity="0.4"/>
    <path d="M50,50 C50,20 70,20 70,40 L70,60" stroke="#1e40af" stroke-width="4" fill="none" opacity="0.4"/>
    <circle cx="50" cy="110" r="5" fill="#1e40af" opacity="0.4"/>
  </g>
  <!-- Pills decoration -->
  <g transform="translate(650, 260)">
    <rect x="0" y="0" width="40" height="18" rx="9" fill="#10b981" opacity="0.4"/>
    <rect x="20" y="0" width="20" height="18" rx="0 9 9 0" fill="#10b981" opacity="0.6"/>
  </g>
  <g transform="translate(680, 290)">
    <rect x="0" y="0" width="40" height="18" rx="9" fill="#3b82f6" opacity="0.4"/>
    <rect x="20" y="0" width="20" height="18" rx="0 9 9 0" fill="#3b82f6" opacity="0.6"/>
  </g>
  <!-- Ground -->
  <rect x="200" y="350" width="400" height="8" rx="4" fill="#1e40af" opacity="0.1"/>
</svg>