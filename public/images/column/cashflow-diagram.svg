<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Central flow path -->
  <path d="M100,200 C200,100 300,300 400,200 C500,100 600,300 700,200" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M100,220 C200,120 300,320 400,220 C500,120 600,320 700,220" stroke="#1e40af" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- Money node 1 -->
  <circle cx="150" cy="160" r="45" fill="#1e40af"/>
  <circle cx="150" cy="160" r="30" fill="#fff" opacity="0.2"/>
  <ellipse cx="150" cy="160" rx="16" ry="20" fill="none" stroke="#fff" stroke-width="3"/>
  <line x1="142" y1="155" x2="158" y2="155" stroke="#fff" stroke-width="2"/>
  <line x1="142" y1="165" x2="158" y2="165" stroke="#fff" stroke-width="2"/>
  <!-- Arrow 1 -->
  <path d="M200,155 Q260,110 310,170" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#arrowG)"/>
  <defs>
    <marker id="arrowG" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#10b981"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#3b82f6"/>
    </marker>
    <marker id="arrowA" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#f59e0b"/>
    </marker>
  </defs>
  <!-- Money node 2 -->
  <circle cx="350" cy="200" r="45" fill="#10b981"/>
  <circle cx="350" cy="200" r="30" fill="#fff" opacity="0.2"/>
  <ellipse cx="350" cy="200" rx="16" ry="20" fill="none" stroke="#fff" stroke-width="3"/>
  <line x1="342" y1="195" x2="358" y2="195" stroke="#fff" stroke-width="2"/>
  <line x1="342" y1="205" x2="358" y2="205" stroke="#fff" stroke-width="2"/>
  <!-- Arrow 2 -->
  <path d="M400,195 Q440,130 490,175" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrowB)"/>
  <!-- Money node 3 -->
  <circle cx="530" cy="190" r="45" fill="#f59e0b"/>
  <circle cx="530" cy="190" r="30" fill="#fff" opacity="0.2"/>
  <ellipse cx="530" cy="190" rx="16" ry="20" fill="none" stroke="#fff" stroke-width="3"/>
  <line x1="522" y1="185" x2="538" y2="185" stroke="#fff" stroke-width="2"/>
  <line x1="522" y1="195" x2="538" y2="195" stroke="#fff" stroke-width="2"/>
  <!-- Arrow 3 -->
  <path d="M580,185 Q620,240 650,190" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowA)"/>
  <!-- End node -->
  <circle cx="690" cy="180" r="40" fill="#1e40af"/>
  <path d="M675,180 l8,8 l16,-20" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Floating coins -->
  <ellipse cx="250" cy="80" rx="22" ry="8" fill="#fbbf24" opacity="0.5"/>
  <ellipse cx="250" cy="74" rx="22" ry="8" fill="#f59e0b" opacity="0.5"/>
  <ellipse cx="600" cy="320" rx="22" ry="8" fill="#fbbf24" opacity="0.5"/>
  <ellipse cx="600" cy="314" rx="22" ry="8" fill="#f59e0b" opacity="0.5"/>
  <!-- Small arrows decoration -->
  <polygon points="440,320 460,310 460,330" fill="#3b82f6" opacity="0.2"/>
  <polygon points="460,320 480,310 480,330" fill="#3b82f6" opacity="0.15"/>
</svg>