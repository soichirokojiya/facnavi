<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Ground -->
  <rect x="0" y="330" width="800" height="70" rx="0" fill="#1e40af" opacity="0.06"/>
  <!-- Shop building -->
  <rect x="230" y="120" width="340" height="210" rx="8" fill="#fff" stroke="#1e40af" stroke-width="2"/>
  <!-- Roof / awning -->
  <path d="M210,125 L400,50 L590,125 Z" fill="#1e40af"/>
  <path d="M220,130 L400,60 L580,130 Z" fill="#3b82f6"/>
  <!-- Awning stripes -->
  <rect x="230" y="120" width="340" height="30" rx="0" fill="#1e40af"/>
  <!-- Scalloped awning edge -->
  <circle cx="260" cy="150" r="15" fill="#1e40af"/>
  <circle cx="290" cy="150" r="15" fill="#1e40af"/>
  <circle cx="320" cy="150" r="15" fill="#1e40af"/>
  <circle cx="350" cy="150" r="15" fill="#1e40af"/>
  <circle cx="380" cy="150" r="15" fill="#1e40af"/>
  <circle cx="410" cy="150" r="15" fill="#1e40af"/>
  <circle cx="440" cy="150" r="15" fill="#1e40af"/>
  <circle cx="470" cy="150" r="15" fill="#1e40af"/>
  <circle cx="500" cy="150" r="15" fill="#1e40af"/>
  <circle cx="530" cy="150" r="15" fill="#1e40af"/>
  <!-- Shop window left -->
  <rect x="260" y="175" width="115" height="90" rx="6" fill="#bfdbfe" opacity="0.5"/>
  <rect x="265" y="180" width="105" height="80" rx="4" fill="#dbeafe"/>
  <!-- Window shelves -->
  <line x1="265" y1="210" x2="370" y2="210" stroke="#93c5fd" stroke-width="1"/>
  <line x1="265" y1="240" x2="370" y2="240" stroke="#93c5fd" stroke-width="1"/>
  <!-- Items on shelves -->
  <rect x="275" y="192" width="15" height="16" rx="3" fill="#f59e0b" opacity="0.5"/>
  <rect x="300" y="196" width="12" height="12" rx="3" fill="#10b981" opacity="0.5"/>
  <rect x="330" y="194" width="14" height="14" rx="3" fill="#3b82f6" opacity="0.5"/>
  <circle cx="285" cy="230" r="7" fill="#ef4444" opacity="0.4"/>
  <circle cx="310" cy="228" r="8" fill="#f59e0b" opacity="0.4"/>
  <rect x="340" y="222" width="16" height="16" rx="3" fill="#10b981" opacity="0.4"/>
  <!-- Shop door -->
  <rect x="410" y="185" width="80" height="145" rx="6" fill="#1e40af" opacity="0.6"/>
  <rect x="418" y="193" width="64" height="55" rx="4" fill="#bfdbfe" opacity="0.4"/>
  <circle cx="480" cy="265" r="5" fill="#f59e0b"/>
  <!-- Shop window right -->
  <rect x="520" y="175" width="30" height="90" rx="6" fill="#bfdbfe" opacity="0.5"/>
  <!-- Open sign circle -->
  <g transform="translate(420, 150)">
    <circle cx="15" cy="15" r="12" fill="#10b981"/>
    <circle cx="15" cy="15" r="8" fill="#fff" opacity="0.3"/>
  </g>
  <!-- Flower pot left -->
  <g transform="translate(190, 280)">
    <rect x="5" y="20" width="30" height="25" rx="4" fill="#d97706"/>
    <circle cx="20" cy="15" r="12" fill="#10b981" opacity="0.5"/>
    <circle cx="12" cy="10" r="8" fill="#10b981" opacity="0.5"/>
    <circle cx="28" cy="12" r="8" fill="#10b981" opacity="0.5"/>
  </g>
  <!-- Flower pot right -->
  <g transform="translate(575, 280)">
    <rect x="5" y="20" width="30" height="25" rx="4" fill="#d97706"/>
    <circle cx="20" cy="15" r="12" fill="#10b981" opacity="0.5"/>
    <circle cx="12" cy="10" r="8" fill="#10b981" opacity="0.5"/>
    <circle cx="28" cy="12" r="8" fill="#10b981" opacity="0.5"/>
  </g>
  <!-- Coins floating -->
  <ellipse cx="680" cy="120" rx="25" ry="10" fill="#fbbf24" opacity="0.4"/>
  <ellipse cx="680" cy="112" rx="25" ry="10" fill="#f59e0b" opacity="0.4"/>
  <ellipse cx="120" cy="150" rx="25" ry="10" fill="#fbbf24" opacity="0.4"/>
  <ellipse cx="120" cy="142" rx="25" ry="10" fill="#f59e0b" opacity="0.4"/>
</svg>