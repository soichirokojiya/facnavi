<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Pie chart -->
  <g transform="translate(200, 200)">
    <circle cx="0" cy="0" r="120" fill="#3b82f6"/>
    <path d="M0,0 L0,-120 A120,120 0 0,1 103.9,60 Z" fill="#1e40af"/>
    <path d="M0,0 L103.9,60 A120,120 0 0,1 -60,103.9 Z" fill="#6366f1"/>
    <path d="M0,0 L-60,103.9 A120,120 0 0,1 -103.9,-60 Z" fill="#8b5cf6"/>
    <path d="M0,0 L-103.9,-60 A120,120 0 0,1 0,-120 Z" fill="#a78bfa"/>
    <circle cx="0" cy="0" r="45" fill="#f0f4ff"/>
    <text x="0" y="5" text-anchor="middle" fill="#1e40af" font-size="12" font-weight="bold" font-family="sans-serif">経費内訳</text>
  </g>
  <!-- Legend -->
  <g transform="translate(420, 80)">
    <rect x="0" y="0" width="300" height="240" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="150" y="30" text-anchor="middle" fill="#334155" font-size="14" font-weight="bold" font-family="sans-serif">主な経費カテゴリ</text>
    <!-- Items -->
    <rect x="20" y="50" width="14" height="14" rx="3" fill="#1e40af"/>
    <text x="42" y="62" fill="#475569" font-size="12" font-family="sans-serif">通信費・旅費交通費</text>
    <rect x="20" y="80" width="14" height="14" rx="3" fill="#3b82f6"/>
    <text x="42" y="92" fill="#475569" font-size="12" font-family="sans-serif">地代家賃・水道光熱費</text>
    <rect x="20" y="110" width="14" height="14" rx="3" fill="#6366f1"/>
    <text x="42" y="122" fill="#475569" font-size="12" font-family="sans-serif">外注費・広告宣伝費</text>
    <rect x="20" y="140" width="14" height="14" rx="3" fill="#8b5cf6"/>
    <text x="42" y="152" fill="#475569" font-size="12" font-family="sans-serif">消耗品費・接待交際費</text>
    <rect x="20" y="170" width="14" height="14" rx="3" fill="#a78bfa"/>
    <text x="42" y="182" fill="#475569" font-size="12" font-family="sans-serif">減価償却費・その他</text>
    <!-- Divider -->
    <line x1="20" y1="200" x2="280" y2="200" stroke="#e2e8f0" stroke-width="1"/>
    <text x="150" y="225" text-anchor="middle" fill="#10b981" font-size="11" font-weight="bold" font-family="sans-serif">✓ 家事按分で自宅経費もOK</text>
  </g>
</svg>