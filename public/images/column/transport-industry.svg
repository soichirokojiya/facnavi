<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f4ff" rx="12"/>
  <!-- Road -->
  <rect x="0" y="300" width="800" height="60" rx="0" fill="#94a3b8" opacity="0.2"/>
  <rect x="50" y="325" width="60" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <rect x="160" y="325" width="60" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <rect x="270" y="325" width="60" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <rect x="380" y="325" width="60" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <rect x="490" y="325" width="60" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <rect x="600" y="325" width="60" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <rect x="710" y="325" width="60" height="6" rx="3" fill="#fff" opacity="0.5"/>
  <!-- Truck body (cargo) -->
  <rect x="200" y="170" width="320" height="130" rx="10" fill="#1e40af"/>
  <!-- Truck cargo door lines -->
  <line x1="360" y1="180" x2="360" y2="290" stroke="#3b82f6" stroke-width="2"/>
  <line x1="440" y1="180" x2="440" y2="290" stroke="#3b82f6" stroke-width="2"/>
  <rect x="210" y="265" width="300" height="25" rx="4" fill="#1e40af"/>
  <!-- Truck cab -->
  <rect x="520" y="200" width="120" height="100" rx="10" fill="#3b82f6"/>
  <rect x="545" y="215" width="70" height="45" rx="8" fill="#bfdbfe"/>
  <!-- Windshield reflection -->
  <rect x="590" y="218" width="20" height="39" rx="4" fill="#fff" opacity="0.3"/>
  <!-- Bumper -->
  <rect x="530" y="290" width="120" height="12" rx="4" fill="#1e40af"/>
  <!-- Headlight -->
  <rect x="636" y="260" width="14" height="18" rx="4" fill="#fbbf24"/>
  <!-- Wheels -->
  <circle cx="280" cy="305" r="28" fill="#334155"/>
  <circle cx="280" cy="305" r="14" fill="#94a3b8"/>
  <circle cx="380" cy="305" r="28" fill="#334155"/>
  <circle cx="380" cy="305" r="14" fill="#94a3b8"/>
  <circle cx="580" cy="305" r="28" fill="#334155"/>
  <circle cx="580" cy="305" r="14" fill="#94a3b8"/>
  <!-- Speed lines -->
  <rect x="60" y="200" width="100" height="5" rx="3" fill="#3b82f6" opacity="0.3"/>
  <rect x="80" y="220" width="80" height="5" rx="3" fill="#3b82f6" opacity="0.25"/>
  <rect x="40" y="240" width="120" height="5" rx="3" fill="#3b82f6" opacity="0.2"/>
  <rect x="70" y="260" width="90" height="5" rx="3" fill="#3b82f6" opacity="0.15"/>
  <!-- Package icons on truck -->
  <rect x="230" y="195" width="40" height="40" rx="4" fill="#f59e0b" opacity="0.6"/>
  <line x1="250" y1="195" x2="250" y2="235" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
  <line x1="230" y1="215" x2="270" y2="215" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
  <rect x="290" y="195" width="40" height="40" rx="4" fill="#f59e0b" opacity="0.5"/>
  <line x1="310" y1="195" x2="310" y2="235" stroke="#d97706" stroke-width="1.5" opacity="0.5"/>
  <line x1="290" y1="215" x2="330" y2="215" stroke="#d97706" stroke-width="1.5" opacity="0.5"/>
  <!-- Cloud -->
  <g transform="translate(200, 40)">
    <ellipse cx="60" cy="30" rx="45" ry="22" fill="#cbd5e1" opacity="0.3"/>
    <ellipse cx="40" cy="30" rx="25" ry="18" fill="#cbd5e1" opacity="0.3"/>
    <ellipse cx="85" cy="30" rx="25" ry="18" fill="#cbd5e1" opacity="0.3"/>
  </g>
  <g transform="translate(500, 60)">
    <ellipse cx="40" cy="20" rx="30" ry="15" fill="#cbd5e1" opacity="0.2"/>
    <ellipse cx="25" cy="20" rx="18" ry="12" fill="#cbd5e1" opacity="0.2"/>
    <ellipse cx="58" cy="20" rx="18" ry="12" fill="#cbd5e1" opacity="0.2"/>
  </g>
</svg>